name: Django CI/CD

on:
  push:
    paths-ignore: [ 'README.md' ]
  # allow manual reruns from the Actions tab (an empty retrigger commit
  # matches no paths, so the push trigger skips it)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Install pnpm and JS dependencies
        run: npm install --global pnpm@10.33.0 && pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run checks
        run: make check

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set Version
        run: echo "VERSION_NUMBER=1.7.0" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            registry.kucharczyk.xyz/timetracker:latest
            registry.kucharczyk.xyz/timetracker:${{ env.VERSION_NUMBER }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
