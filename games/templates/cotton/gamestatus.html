<span class="{% if display == 'flex' %}flex{% else %}inline-flex{% endif %} gap-2 items-center align-middle {{class}}">
    <span class="rounded-xl w-3 h-3
    {% if status == "u" %}
    bg-gray-500
    {% elif status == "p" %}
    bg-orange-400
    {% elif status == "f" %}
    bg-green-500
    {% elif status == "a" %}
    bg-red-500
    {% elif status == "r" %}
    bg-purple-500
    {% endif %}
    ">&nbsp;</span>
    {{ slot }}
</span>
